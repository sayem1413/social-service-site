<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1a6b3c"/>
  <!-- Woman figure - head -->
  <circle cx="32" cy="20" r="7" fill="#f0b040"/>
  <!-- Woman figure - body -->
  <ellipse cx="32" cy="38" rx="9" ry="7" fill="#f0b040" opacity="0.9"/>
  <!-- Two side figures (community) -->
  <circle cx="16" cy="25" r="5" fill="white" opacity="0.7"/>
  <ellipse cx="16" cy="37" rx="6" ry="5" fill="white" opacity="0.6"/>
  <circle cx="48" cy="25" r="5" fill="white" opacity="0.7"/>
  <ellipse cx="48" cy="37" rx="6" ry="5" fill="white" opacity="0.6"/>
  <!-- Connecting arc (unity) -->
  <path d="M14 30 Q32 18 50 30" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Foundation base -->
  <rect x="18" y="48" width="28" height="3" rx="1.5" fill="white" opacity="0.4"/>
