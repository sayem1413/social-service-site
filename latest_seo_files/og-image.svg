<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3d22"/>
      <stop offset="60%" style="stop-color:#1a6b3c"/>
      <stop offset="100%" style="stop-color:#2d9e5f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4921e"/>
      <stop offset="100%" style="stop-color:#f0b040"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="100" r="260" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <circle cx="980" cy="100" r="160" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <circle cx="100" cy="580" r="300" fill="none" stroke="rgba(212,146,30,0.08)" stroke-width="1"/>

  <!-- Gold accent bar -->
  <rect x="80" y="200" width="6" height="160" rx="3" fill="url(#gold)"/>

  <!-- Logo icon -->
  <circle cx="115" cy="130" r="36" fill="#d4921e"/>
  <circle cx="115" cy="119" r="10" fill="white" opacity="0.9"/>
  <ellipse cx="115" cy="138" rx="13" ry="9" fill="white" opacity="0.8"/>
  <circle cx="96" cy="124" r="7" fill="white" opacity="0.6"/>
  <circle cx="134" cy="124" r="7" fill="white" opacity="0.6"/>

  <!-- Foundation name -->
  <text x="165" y="118" font-family="Georgia, serif" font-size="38" font-weight="900" fill="white" letter-spacing="0.5">Subaita Foundation</text>
  <text x="165" y="148" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" letter-spacing="4">EMPOWER · EDUCATE · ELEVATE</text>

  <!-- Main headline -->
  <text x="100" y="270" font-family="Georgia, serif" font-size="62" font-weight="900" fill="white">Empowering Women,</text>
  <text x="100" y="345" font-family="Georgia, serif" font-size="62" font-weight="900" fill="url(#gold)">Transforming Communities.</text>

  <!-- Description -->
  <text x="102" y="415" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.72)">A non-profit organization in Narayanganj, Bangladesh dedicated to</text>
  <text x="102" y="445" font-family="Arial, sans-serif" font-size="22" fill="rgba(255,255,255,0.72)">women's empowerment, skill development &amp; social protection.</text>

  <!-- Divider -->
  <line x1="100" y1="490" x2="700" y2="490" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Stats -->
  <text x="100" y="530" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#f0b040">5,000+</text>
  <text x="100" y="558" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="1">WOMEN SUPPORTED</text>

  <text x="295" y="530" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#f0b040">40+</text>
  <text x="295" y="558" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="1">PROGRAMS</text>

  <text x="450" y="530" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#f0b040">10+</text>
  <text x="450" y="558" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="1">YEARS</text>

  <text x="590" y="530" font-family="Georgia, serif" font-size="32" font-weight="900" fill="#f0b040">150+</text>
  <text x="590" y="558" font-family="Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.55)" letter-spacing="1">VOLUNTEERS</text>

  <!-- URL -->
  <text x="1100" y="600" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.4)" text-anchor="end">subaitafoundation.com</text>
</svg>
