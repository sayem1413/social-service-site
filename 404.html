<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />

  <!-- ── FAVICON ── -->
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="shortcut icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="apple-touch-icon" href="assets/favicon.svg" />
  <meta name="msapplication-TileImage" content="assets/favicon.svg" />
  <meta name="msapplication-TileColor" content="#1a6b3c" />
  <meta name="theme-color" content="#1a6b3c" />

  <title>Page Not Found — Subaita Foundation</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 40px 5%;
      text-align: center
    }

    .error-inner {
      max-width: 540px
    }

    .error-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(6rem, 18vw, 10rem);
      font-weight: 900;
      color: var(--green);
      line-height: 1;
      opacity: .12;
      display: block;
      margin-bottom: -20px
    }

    .error-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 16px
    }

    .error-inner h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--dark);
      margin-bottom: 14px
    }

    .error-inner p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 32px
    }

    .error-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center
    }
  </style>
</head>

<body>
  <div class="error-page">
    <div class="error-inner">
      <span class="error-num">404</span>
      <span class="error-icon">🌸</span>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
      <div class="error-links">
        <a href="index.html" class="btn btn-green">Go to Home</a>
        <a href="programs.html" class="btn btn-outline">Our Programs</a>
        <a href="contact.html" class="btn btn-outline">Contact Us</a>
      </div>
    </div>
  </div>
</body>

</html>
