<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Background circle — green -->
  <circle cx="32" cy="32" r="32" fill="#1a6b3c"/>

  <!-- ── SUN ── -->
  <ellipse cx="32" cy="41" rx="13" ry="9" fill="#f5d800"/>

  <!-- Sun rays red -->
  <line x1="32" y1="29" x2="32" y2="23" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="31" x2="43" y2="26" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="42" y1="37" x2="48" y2="35" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="31" x2="21" y2="26" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="37" x2="16" y2="35" stroke="#cc0000" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="30" x2="37" y2="24" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29" y1="30" x2="27" y2="24" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ── PERSON TOP-LEFT ── -->
  <circle cx="17" cy="16" r="4" fill="#111"/>
  <ellipse cx="17" cy="25" rx="3.5" ry="4.5" fill="#111"/>

  <!-- ── PERSON TOP-RIGHT ── -->
  <circle cx="47" cy="16" r="4" fill="#111"/>
  <ellipse cx="47" cy="25" rx="3.5" ry="4.5" fill="#111"/>

  <!-- ── PERSON BOTTOM-LEFT ── -->
  <circle cx="11" cy="35" r="3.5" fill="#111"/>
  <ellipse cx="11" cy="43" rx="3" ry="4" fill="#111"/>

  <!-- ── PERSON BOTTOM-RIGHT ── -->
  <circle cx="53" cy="35" r="3.5" fill="#111"/>
  <ellipse cx="53" cy="43" rx="3" ry="4" fill="#111"/>

  <!-- ── ARMS LINKING ── -->
  <!-- Top two holding hands across top -->
  <path d="M21 20 Q32 13 43 20" stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Top-left to bottom-left -->
  <path d="M14 23 Q9 29 11 32" stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Top-right to bottom-right -->
  <path d="M50 23 Q55 29 53 32" stroke="#111" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- Bottom two toward sun -->
  <path d="M14 45 Q22 51 32 51" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M50 45 Q42 51 32 51" stroke="#111" stroke-width="2" fill="none" stroke-linecap="round"/>

</svg>
