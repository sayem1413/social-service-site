<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Page Not Found | Subaita Foundation</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    font-family: Arial, sans-serif;
    background:#f8fafc;
    margin:0;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    text-align:center;
    padding:20px;
}

.error-box{
    max-width:600px;
}

h1{
    font-size:120px;
    margin:0;
    color:#0f172a;
}

p{
    color:#475569;
    margin:20px 0;
}

a{
    display:inline-block;
    padding:14px 28px;
    background:#0f172a;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="error-box">
    <h1>404</h1>
    <h2>Page Not Found</h2>

    <p>
        The page you are looking for does not exist or has been moved.
    </p>

    <a href="/">Back to Home</a>
</div>

</body>
</html>
